name: Auto Build APK or EXE V2

on:
  workflow_dispatch:
  push:
    paths:
      - "**/*.zip"
      - ".github/workflows/auto-build-v2.yml"

permissions:
  contents: read

jobs:
  detect:
    name: Find ZIP and detect project
    runs-on: ubuntu-latest
    outputs:
      zip_file: ${{ steps.detect.outputs.zip_file }}
      project_type: ${{ steps.detect.outputs.project_type }}
      project_root: ${{ steps.detect.outputs.project_root }}
      gradle_version: ${{ steps.detect.outputs.gradle_version }}
      compile_sdk: ${{ steps.detect.outputs.compile_sdk }}
      build_tools: ${{ steps.detect.outputs.build_tools }}
      entrypoint: ${{ steps.detect.outputs.entrypoint }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Automatically find ZIP and detect project
        id: detect
        shell: bash
        env:
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          python - <<'PY'
          import os
          import re
          import subprocess
          import zipfile
          from pathlib import Path, PurePosixPath

          ignored = {".git", ".github", "build", "dist", "deliverables", "__pycache__"}

          def valid_zip(path):
              return (
                  path.is_file()
                  and path.suffix.lower() == ".zip"
                  and not any(part.lower() in ignored for part in path.parts)
              )

          candidates = []
          before = os.environ.get("BEFORE_SHA", "")
          after = os.environ.get("AFTER_SHA", "")

          if before and after and set(before) != {"0"}:
              result = subprocess.run(
                  ["git", "diff", "--name-only", before, after],
                  capture_output=True,
                  text=True,
                  check=False,
              )
              for line in result.stdout.splitlines():
                  path = Path(line.strip())
                  if valid_zip(path):
                      candidates.append(path)

          if not candidates:
              candidates = [path for path in Path(".").rglob("*.zip") if valid_zip(path)]

          if not candidates:
              raise SystemExit("No ZIP found. Upload an Android or Windows source ZIP.")

          candidates.sort(key=lambda path: path.stat().st_mtime, reverse=True)
          selected = candidates[0]

          with zipfile.ZipFile(selected) as archive:
              names = [
                  name.replace("\\", "/").lstrip("./")
                  for name in archive.namelist()
                  if not name.endswith("/") and "__macosx/" not in name.lower()
              ]

              def read(name):
                  try:
                      return archive.read(name).decode("utf-8", errors="replace")
                  except Exception:
                      return ""

              project_type = ""
              project_root = ""
              gradle_version = "8.9"
              compile_sdk = "35"
              build_tools = "35.0.0"
              entrypoint = ""

              settings_files = [
                  name for name in names
                  if PurePosixPath(name).name.lower() in ("settings.gradle", "settings.gradle.kts")
              ]

              for settings in sorted(settings_files, key=lambda value: (value.count("/"), len(value))):
                  root = str(PurePosixPath(settings).parent)
                  if root == ".":
                      root = ""
                  prefix = f"{root}/" if root else ""

                  if (
                      f"{prefix}app/build.gradle" in names
                      or f"{prefix}app/build.gradle.kts" in names
                  ):
                      project_type = "android"
                      project_root = root

                      build_files = [
                          name for name in names
                          if name.startswith(prefix)
                          and PurePosixPath(name).name.lower()
                          in ("build.gradle", "build.gradle.kts", "libs.versions.toml")
                      ]
                      build_text = "\n".join(read(name) for name in build_files)

                      sdk_match = re.search(
                          r'compileSdk(?:Version)?\s*(?:=|\s)\s*["\']?([0-9]+)',
                          build_text,
                          flags=re.IGNORECASE,
                      )
                      if sdk_match:
                          compile_sdk = sdk_match.group(1)
                          build_tools = f"{compile_sdk}.0.0"

                      agp_match = re.search(
                          r'(?:com\.android\.application.*?version\s*["\']|'
                          r'com\.android\.tools\.build:gradle:|'
                          r'agp\s*=\s*["\'])([0-9.]+)',
                          build_text,
                          flags=re.IGNORECASE | re.DOTALL,
                      )
                      if agp_match:
                          try:
                              major, minor = [int(x) for x in agp_match.group(1).split(".")[:2]]
                              if (major, minor) <= (8, 7):
                                  gradle_version = "8.9"
                              elif (major, minor) <= (8, 10):
                                  gradle_version = "8.11.1"
                              else:
                                  gradle_version = "8.13"
                          except Exception:
                              pass
                      break

              if not project_type:
                  py_candidates = [
                      name for name in names
                      if PurePosixPath(name).name.lower()
                      in ("app.py", "main.py", "gui.py", "desktop_app.py")
                  ]

                  if py_candidates:
                      selected_py = sorted(
                          py_candidates,
                          key=lambda value: (value.count("/"), len(value)),
                      )[0]
                      root = str(PurePosixPath(selected_py).parent)
                      if root == ".":
                          root = ""
                      prefix = f"{root}/" if root else ""

                      project_type = "windows_python"
                      project_root = root
                      entrypoint = (
                          selected_py[len(prefix):]
                          if prefix and selected_py.startswith(prefix)
                          else selected_py
                      )

              if not project_type:
                  existing = [
                      name for name in names
                      if name.lower().endswith((".apk", ".exe", ".msi"))
                  ]
                  if existing:
                      project_type = "prebuilt"

          output = os.environ["GITHUB_OUTPUT"]
          with open(output, "a", encoding="utf-8") as handle:
              handle.write(f"zip_file={selected.as_posix()}\n")
              handle.write(f"project_type={project_type}\n")
              handle.write(f"project_root={project_root}\n")
              handle.write(f"gradle_version={gradle_version}\n")
              handle.write(f"compile_sdk={compile_sdk}\n")
              handle.write(f"build_tools={build_tools}\n")
              handle.write(f"entrypoint={entrypoint}\n")

          print("Selected ZIP:", selected)
          print("Detected type:", project_type)
          print("Project root:", project_root)

          if not project_type:
              raise SystemExit(
                  "Unknown ZIP type. It must contain an Android Gradle project, "
                  "a Python desktop app, or an APK/EXE."
              )
          PY

  build-android:
    name: Build Android APK
    needs: detect
    if: ${{ needs.detect.outputs.project_type == 'android' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        shell: bash
        run: yes | sdkmanager --licenses > /dev/null || true

      - name: Install Android SDK
        shell: bash
        env:
          COMPILE_SDK: ${{ needs.detect.outputs.compile_sdk }}
          BUILD_TOOLS: ${{ needs.detect.outputs.build_tools }}
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-${COMPILE_SDK}" \
            "build-tools;${BUILD_TOOLS}"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: ${{ needs.detect.outputs.gradle_version }}

      - name: Extract source ZIP
        shell: bash
        run: |
          rm -rf extracted deliverables
          mkdir extracted deliverables
          unzip -q "${{ needs.detect.outputs.zip_file }}" -d extracted

      - name: Build APK
        shell: bash
        env:
          PROJECT_ROOT: ${{ needs.detect.outputs.project_root }}
        run: |
          set -e
          PROJECT="extracted"
          if [ -n "${PROJECT_ROOT}" ]; then
            PROJECT="${PROJECT}/${PROJECT_ROOT}"
          fi

          cd "${PROJECT}"

          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
            ./gradlew --no-daemon clean assembleDebug --stacktrace
          else
            gradle --no-daemon clean assembleDebug --stacktrace
          fi

      - name: Collect APK
        shell: bash
        run: |
          find extracted \
            -type f \
            -path "*/build/outputs/apk/*/*.apk" \
            ! -name "*androidTest*" \
            -exec cp {} deliverables/ \;

          test "$(find deliverables -type f -name '*.apk' | wc -l)" -gt 0
          cd deliverables
          sha256sum *.apk > SHA256.txt

      - name: Upload ready APK
        uses: actions/upload-artifact@v4
        with:
          name: READY-APK
          path: deliverables/
          if-no-files-found: error
          retention-days: 30

  build-windows:
    name: Build portable Windows EXE
    needs: detect
    if: ${{ needs.detect.outputs.project_type == 'windows_python' }}
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Extract source ZIP
        shell: pwsh
        run: |
          Remove-Item extracted, deliverables -Recurse -Force `
            -ErrorAction SilentlyContinue
          New-Item -ItemType Directory extracted | Out-Null
          New-Item -ItemType Directory deliverables | Out-Null
          Expand-Archive `
            -Path "${{ needs.detect.outputs.zip_file }}" `
            -DestinationPath extracted `
            -Force

      - name: Install dependencies
        shell: pwsh
        env:
          PROJECT_ROOT: ${{ needs.detect.outputs.project_root }}
        run: |
          $project = "extracted"
          if ($env:PROJECT_ROOT) {
            $project = Join-Path $project $env:PROJECT_ROOT
          }

          python -m pip install --upgrade pip
          $requirements = Join-Path $project "requirements.txt"

          if (Test-Path $requirements) {
            pip install -r $requirements
          }

          pip install pyinstaller

      - name: Run optional test
        shell: pwsh
        env:
          PROJECT_ROOT: ${{ needs.detect.outputs.project_root }}
        run: |
          $project = "extracted"
          if ($env:PROJECT_ROOT) {
            $project = Join-Path $project $env:PROJECT_ROOT
          }

          $test = Join-Path $project "smoke_test.py"
          if (Test-Path $test) {
            Push-Location $project
            python smoke_test.py
            Pop-Location
          }

      - name: Build EXE
        shell: pwsh
        env:
          PROJECT_ROOT: ${{ needs.detect.outputs.project_root }}
          ENTRYPOINT: ${{ needs.detect.outputs.entrypoint }}
        run: |
          $project = "extracted"
          if ($env:PROJECT_ROOT) {
            $project = Join-Path $project $env:PROJECT_ROOT
          }

          Push-Location $project

          $extra = @()

          python -c "import fitz" 2>$null
          if ($LASTEXITCODE -eq 0) {
            $extra += @("--collect-all", "fitz")
          }

          python -c "import pymupdf" 2>$null
          if ($LASTEXITCODE -eq 0) {
            $extra += @("--collect-all", "pymupdf")
          }

          python -c "import win32com.client" 2>$null
          if ($LASTEXITCODE -eq 0) {
            $extra += @(
              "--hidden-import", "win32com.client",
              "--hidden-import", "pythoncom"
            )
          }

          $icon = Get-ChildItem -Recurse -Filter *.ico |
            Select-Object -First 1
          if ($icon) {
            $extra += @("--icon", $icon.FullName)
          }

          pyinstaller --noconfirm --clean --windowed --onedir `
            --name "Portable Application" `
            @extra `
            $env:ENTRYPOINT

          pyinstaller --noconfirm --clean --windowed --onefile `
            --name "Portable Application Compact" `
            @extra `
            $env:ENTRYPOINT

          Pop-Location

      - name: Collect EXE
        shell: pwsh
        env:
          PROJECT_ROOT: ${{ needs.detect.outputs.project_root }}
        run: |
          $project = "extracted"
          if ($env:PROJECT_ROOT) {
            $project = Join-Path $project $env:PROJECT_ROOT
          }

          $dist = Join-Path $project "dist"

          Get-ChildItem $dist -Directory | ForEach-Object {
            $safe = $_.Name -replace '[^A-Za-z0-9._-]', '-'
            Compress-Archive `
              -Path $_.FullName `
              -DestinationPath (
                Join-Path deliverables "$safe-Portable.zip"
              ) `
              -Force
          }

          Get-ChildItem $dist -File -Filter *.exe |
            Copy-Item -Destination deliverables

          if ((Get-ChildItem deliverables -File).Count -eq 0) {
            throw "No EXE was created."
          }

      - name: Upload ready EXE
        uses: actions/upload-artifact@v4
        with:
          name: READY-WINDOWS-EXE
          path: deliverables/
          if-no-files-found: error
          retention-days: 30

  publish-existing:
    name: Publish existing APK or EXE
    needs: detect
    if: ${{ needs.detect.outputs.project_type == 'prebuilt' }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Extract existing application
        shell: bash
        run: |
          rm -rf extracted deliverables
          mkdir extracted deliverables
          unzip -q "${{ needs.detect.outputs.zip_file }}" -d extracted

          find extracted \
            -type f \
            \( -iname "*.apk" -o -iname "*.exe" -o -iname "*.msi" \) \
            -exec cp {} deliverables/ \;

          test "$(find deliverables -type f | wc -l)" -gt 0

      - name: Upload application
        uses: actions/upload-artifact@v4
        with:
          name: READY-APPLICATION
          path: deliverables/
          if-no-files-found: error
          retention-days: 30
